---
- name: Deploy E-Commerce App
  hosts: web
  become: yes

  vars:
    app_dir: /opt/ecommerce

  tasks:
    # ── Install Docker ────────────────────────────────────
    - name: Install required packages
      yum:
        name:
          - docker
          - python3
          - python3-pip
          - git
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    # ── Install Docker Compose ────────────────────────────
    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    # ── Create App Directory ──────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        mode: "0755"

    # ── Deploy docker-compose.yml ─────────────────────────
    - name: Copy docker-compose file
      copy:
        dest: "{{ app_dir }}/docker-compose.yml"
        content: |
          version: '3.8'
          services:
            mongodb:
              image: mongo:6
              container_name: mongodb
              restart: always
              volumes:
                - mongo_data:/data/db
              networks:
                - app-network

            app:
              image: node:18-alpine
              container_name: nodejs-app
              working_dir: /app
              volumes:
                - ./app:/app
              command: sh -c "npm install && npm start"
              environment:
                - MONGO_URI=mongodb://mongodb:27017/ecommerce
                - PORT=3000
              depends_on:
                - mongodb
              networks:
                - app-network

            nginx:
              image: nginx:alpine
              container_name: nginx
              ports:
                - "80:80"
              volumes:
                - ./nginx.conf:/etc/nginx/conf.d/default.conf
              depends_on:
                - app
              networks:
                - app-network

          volumes:
            mongo_data:

          networks:
            app-network:
              driver: bridge

    # ── Nginx config ──────────────────────────────────────
    - name: Copy Nginx config
      copy:
        dest: "{{ app_dir }}/nginx.conf"
        content: |
          server {
              listen 80;
              location / {
                  proxy_pass http://app:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    # ── Simple Node.js App ────────────────────────────────
    - name: Create app directory
      file:
        path: "{{ app_dir }}/app"
        state: directory

    - name: Create package.json
      copy:
        dest: "{{ app_dir }}/app/package.json"
        content: |
          {
            "name": "ecommerce-app",
            "version": "1.0.0",
            "main": "index.js",
            "scripts": { "start": "node index.js" },
            "dependencies": {
              "express": "^4.18.0",
              "mongoose": "^7.0.0"
            }
          }

    - name: Create Node.js app
      copy:
        dest: "{{ app_dir }}/app/index.js"
        content: |
          const express = require('express');
          const app = express();
          const PORT = process.env.PORT || 3000;

          const products = [
            { id: 1, name: 'Laptop',    price: 1200 },
            { id: 2, name: 'Phone',     price: 800  },
            { id: 3, name: 'Tablet',    price: 500  },
          ];

          app.get('/', (req, res) => {
            let html = `<h1>E-Commerce Store</h1><ul>`;
            products.forEach(p => {
              html += `<li>${p.name} — $${p.price}</li>`;
            });
            html += `</ul>`;
            res.send(html);
          });

          app.get('/api/products', (req, res) => res.json(products));

          app.listen(PORT, () => console.log(`App running on port ${PORT}`));

    # ── Start containers ──────────────────────────────────
    - name: Start Docker Compose stack
      shell: docker-compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      become_user: ec2-user